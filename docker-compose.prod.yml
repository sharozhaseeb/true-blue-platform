name: true-blue-platform

services:
  db:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trueblue-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  migrate:
    image: ${MIGRATE_IMAGE}
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trueblue-net
    profiles:
      - setup

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NODE_ENV: production
      USE_SECURE_COOKIES: ${USE_SECURE_COOKIES}
      ENABLE_TEST_ENDPOINTS: ${ENABLE_TEST_ENDPOINTS:-false}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_KMS_KEY_ID: ${AWS_S3_KMS_KEY_ID}
      AWS_TEXTRACT_REGION: ${AWS_TEXTRACT_REGION:-us-east-1}
      TEXTRACT_FEATURE_SET: ${TEXTRACT_FEATURE_SET:-FORMS,TABLES,LAYOUT}
      TEXTRACT_RESULTS_BUCKET: ${TEXTRACT_RESULTS_BUCKET}
      TEXTRACT_SNS_TOPIC_ARN: ${TEXTRACT_SNS_TOPIC_ARN}
      TEXTRACT_SQS_QUEUE_URL: ${TEXTRACT_SQS_QUEUE_URL}
      TEXTRACT_NOTIFICATION_ROLE_ARN: ${TEXTRACT_NOTIFICATION_ROLE_ARN}
      ENABLE_TEXTRACT_PIPELINE: ${ENABLE_TEXTRACT_PIPELINE:-false}
      ENABLE_BASE_DOCUMENT_DEBUG_API: ${ENABLE_BASE_DOCUMENT_DEBUG_API:-false}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-}
      PINECONE_INDEX_HOST: ${PINECONE_INDEX_HOST:-}
      PINECONE_NAMESPACE_PREFIX: ${PINECONE_NAMESPACE_PREFIX:-trueblue}
      ENABLE_VECTOR_INDEXING: ${ENABLE_VECTOR_INDEXING:-false}
      ENABLE_VECTOR_RETRIEVAL: ${ENABLE_VECTOR_RETRIEVAL:-false}
      VECTOR_MIN_SCORE: ${VECTOR_MIN_SCORE:-0.25}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      ENABLE_AI_CHAT: ${ENABLE_AI_CHAT:-false}
      CHAT_USER_RATE_LIMIT_PER_MINUTE: ${CHAT_USER_RATE_LIMIT_PER_MINUTE:-60}
      CHAT_FIRM_RATE_LIMIT_PER_MINUTE: ${CHAT_FIRM_RATE_LIMIT_PER_MINUTE:-300}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => { if (!r.ok) throw new Error(); process.exit(0); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - trueblue-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  textract-worker:
    image: ${WORKER_IMAGE}
    restart: unless-stopped
    command: ["node", "scripts/textract-worker.js", "--watch"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      NODE_ENV: production
      AWS_REGION: ${AWS_REGION}
      AWS_S3_KMS_KEY_ID: ${AWS_S3_KMS_KEY_ID}
      AWS_TEXTRACT_REGION: ${AWS_TEXTRACT_REGION:-us-east-1}
      TEXTRACT_FEATURE_SET: ${TEXTRACT_FEATURE_SET:-FORMS,TABLES,LAYOUT}
      TEXTRACT_RESULTS_BUCKET: ${TEXTRACT_RESULTS_BUCKET}
      TEXTRACT_SNS_TOPIC_ARN: ${TEXTRACT_SNS_TOPIC_ARN}
      TEXTRACT_SQS_QUEUE_URL: ${TEXTRACT_SQS_QUEUE_URL}
      TEXTRACT_NOTIFICATION_ROLE_ARN: ${TEXTRACT_NOTIFICATION_ROLE_ARN}
      ENABLE_TEXTRACT_PIPELINE: ${ENABLE_TEXTRACT_PIPELINE:-false}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-}
      PINECONE_INDEX_HOST: ${PINECONE_INDEX_HOST:-}
      PINECONE_NAMESPACE_PREFIX: ${PINECONE_NAMESPACE_PREFIX:-trueblue}
      ENABLE_VECTOR_INDEXING: ${ENABLE_VECTOR_INDEXING:-false}
      VECTOR_MIN_SCORE: ${VECTOR_MIN_SCORE:-0.25}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
        required: false
    networks:
      - trueblue-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:alpine@sha256:f46cb72c7df02710e693e863a983ac42f6a9579058a59a35f1ae36c9958e4ce0
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trueblue-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:

networks:
  trueblue-net:
    driver: bridge

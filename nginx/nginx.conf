worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Rate limiting: 10 requests/sec per IP with burst of 20
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Max request body size (for future file uploads)
    client_max_body_size 25M;

    upstream nextjs {
        server app:3000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers (defense in depth on top of Next.js headers)
        # Enable when TLS is configured (M4)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Stricter rate limit on auth endpoints
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;

            # Strip client-injected user context headers to prevent tenant isolation bypass
            proxy_set_header x-user-id "";
            proxy_set_header x-user-role "";
            proxy_set_header x-user-firm-id "";

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Rate limit on API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            # Strip client-injected user context headers to prevent tenant isolation bypass
            proxy_set_header x-user-id "";
            proxy_set_header x-user-role "";
            proxy_set_header x-user-firm-id "";

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cache static assets aggressively
        location /_next/static/ {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # All other requests
        location / {
            # Strip client-injected user context headers to prevent tenant isolation bypass
            proxy_set_header x-user-id "";
            proxy_set_header x-user-role "";
            proxy_set_header x-user-firm-id "";

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Deny dotfiles
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}

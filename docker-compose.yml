services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trueblue
      POSTGRES_PASSWORD: trueblue_dev
      POSTGRES_DB: trueblue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trueblue"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
